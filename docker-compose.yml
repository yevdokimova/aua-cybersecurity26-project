services:
  llm:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ~/.ollama:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list 2>/dev/null | grep -q llama3.2"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: demo
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo"]
      interval: 5s
      timeout: 3s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@demo.com
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      - db

  app:
    build:
      context: .
      dockerfile: demo/Dockerfile
    ports:
      - "8000:8000"
    environment:
      PROXY_HOST: proxy
      PROXY_PORT: ${PROXY_PORT:-6432}
      DB_NAME: demo
      DB_USER: demo
      DB_PASS: demo
      ADMIN_HOST: proxy
      ADMIN_PORT: ${ADMIN_PORT:-9090}
      LLM_HOST: http://llm:11434
      LLM_MODEL: llama3.2:3b
    volumes:
      - logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      llm:
        condition: service_healthy

  proxy:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m sqlshield
    ports:
      - "${PROXY_PORT:-6432}:${PROXY_PORT:-6432}"
      - "${ADMIN_PORT:-9090}:${ADMIN_PORT:-9090}"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      PROXY_PORT: ${PROXY_PORT:-6432}
      ADMIN_PORT: ${ADMIN_PORT:-9090}
      AUDIT_LOG: /app/logs/audit.jsonl
      SHIELD_MODE: enforce
      ANOMALY_LEARNING_QUERIES: 100
    volumes:
      - logs:/app/logs
    depends_on:
      db:
        condition: service_healthy

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m sqlshield.log_server
    ports:
      - "8080:8080"
    environment:
      AUDIT_LOG: /app/logs/audit.jsonl
    volumes:
      - logs:/app/logs
    depends_on:
      - app

volumes:
  logs:
