services:
  db:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: demo
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo"]
      interval: 5s
      timeout: 3s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@demo.com
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      - db

  app:
    build: .
    ports:
      - "8000:8000"
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: demo
      DB_USER: demo
      DB_PASS: demo
      AUDIT_LOG: /app/logs/audit.jsonl
    volumes:
      - logs:/app/logs
    depends_on:
      db:
        condition: service_healthy

volumes:
  logs:
