proxy:
  listen_port: 6432
  backend_host: localhost
  backend_port: 5432

admin:
  port: 9090

engines:
  # enforce  — engine verdicts are respected (queries are actually blocked)
  # monitor  — always allow but log what would have been blocked
  # learning — always allow (anomaly baseline is still being built)
  mode: enforce

  signature:
    # high   — all matched rules block (critical, high, medium, low)
    # medium — critical + high + medium block  (default)
    # low    — only critical + high block
    strictness: medium

  anomaly:
    # Number of queries to observe before switching from learning to detection
    learning_queries: 100

    # Final anomaly score threshold above which a query is blocked (0.0–1.0)
    block_threshold: 0.7

  llm_policy:
    # Tables AI agents are permitted to query
    allowed_tables:
      - products
      - messages
      - chat_logs

    # Block INSERT / UPDATE / DELETE / DDL from AI agents
    block_mutations: true

    # Maximum LIMIT value allowed in AI-generated SELECTs
    max_row_limit: 100

    # Tables that always require a WHERE clause when accessed by AI agents
    require_where_on:
      - users

    # Maximum number of JOINs allowed in a single AI-generated query
    max_join_depth: 2

    # Whether to block subqueries in AI-generated queries (off by default)
    block_subqueries: false
